<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.login-container{
    background:white;
    padding:40px;
    width:350px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.login-container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.input-group input:focus{
    border-color:#4facfe;
    outline:none;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4facfe;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.login-btn:hover{
    background:#2196f3;
}

.extra-links{
    text-align:center;
    margin-top:15px;
}

.extra-links a{
    text-decoration:none;
    color:#2196f3;
}

.extra-links a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="login-container">
    <h2>Login</h2>

    <form>
        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Enter Username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

        <div class="extra-links">
            <p><a href="#">Forgot Password?</a></p>
            <p>Don't have an account?
                <a href="#">Register</a>
            </p>
        </div>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#36d1dc,#5b86e5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.signup-box{
    background:white;
    padding:30px;
    width:400px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.signup-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.input-group input:focus{
    border-color:#5b86e5;
    outline:none;
}

.btn{
    width:100%;
    padding:12px;
    background:#5b86e5;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#3f6fd1;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

.login-link a{
    text-decoration:none;
    color:#5b86e5;
}
</style>
</head>

<body>

<div class="signup-box">
    <h2>Create Account</h2>

    <form>
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter Full Name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter Email" required>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter Phone Number" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Create Password" required>
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="btn">Sign Up</button>

        <div class="login-link">
            Already have an account?
            <a href="#">Login</a>
        </div>
    </form>
</div>

</body>
</html>
