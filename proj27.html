<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Listing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f4f4;
}

/* Header */
.header{
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    text-align:center;
    padding:25px;
}

.header h1{
    font-size:35px;
}

/* Product Container */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px;
}

/* Product Card */
.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card-content h3{
    margin-bottom:10px;
    color:#333;
}

.card-content p{
    color:#666;
    margin-bottom:15px;
}

.price{
    color:#2563eb;
    font-size:22px;
    font-weight:bold;
}

.btn{
    width:100%;
    padding:12px;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:15px;
    font-size:16px;
}

.btn:hover{
    opacity:0.9;
}

/* Responsive */
@media(max-width:768px){
    .header h1{
        font-size:28px;
    }

    .products{
        padding:20px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>Our Products</h1>
    <p>Discover Amazing Products</p>
</div>

<div class="products">

    <div class="card">
        <img src="https://picsum.photos/300/220?1" alt="Laptop">
        <div class="card-content">
            <h3>Laptop</h3>
            <p>High-performance laptop for work and gaming.</p>
            <div class="price">₹50,000</div>
            <button class="btn">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/220?2" alt="Mobile">
        <div class="card-content">
            <h3>Smartphone</h3>
            <p>Latest smartphone with advanced features.</p>
            <div class="price">₹20,000</div>
            <button class="btn">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/220?3" alt="Headphones">
        <div class="card-content">
            <h3>Headphones</h3>
            <p>Premium sound quality and noise cancellation.</p>
            <div class="price">₹3,000</div>
            <button class="btn">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/300/220?4" alt="Watch">
        <div class="card-content">
            <h3>Smart Watch</h3>
            <p>Track fitness, health, and notifications.</p>
            <div class="price">₹5,000</div>
            <button class="btn">Add to Cart</button>
        </div>
    </div>

</div>

</body>
</html>
