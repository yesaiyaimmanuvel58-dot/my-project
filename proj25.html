<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.checkout-container{
    width:100%;
    max-width:1200px;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

.checkout-form,
.order-summary{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h2{
    margin-bottom:20px;
    color:#333;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input, select{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    outline:none;
}

input:focus{
    border-color:#667eea;
}

.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.product{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
}

.total{
    font-size:22px;
    font-weight:bold;
    color:#667eea;
    margin-top:20px;
}

.coupon{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.coupon input{
    flex:1;
}

.coupon button{
    background:#667eea;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

.place-order{
    width:100%;
    margin-top:25px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.place-order:hover{
    transform:translateY(-3px);
}

.secure{
    text-align:center;
    margin-top:15px;
    color:#666;
}

@media(max-width:768px){
    .checkout-container{
        grid-template-columns:1fr;
    }

    .row{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="checkout-container">

    <!-- Checkout Form -->
    <div class="checkout-form">
        <h2>🚚 Shipping Details</h2>

        <div class="row">
            <div class="input-group">
                <label>First Name</label>
                <input type="text" placeholder="John">
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" placeholder="Doe">
            </div>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="john@example.com">
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+91 9876543210">
        </div>

        <div class="input-group">
            <label>Address</label>
            <input type="text" placeholder="Street Address">
        </div>

        <div class="row">
            <div class="input-group">
                <label>City</label>
                <input type="text" placeholder="Chennai">
            </div>

            <div class="input-group">
                <label>Pincode</label>
                <input type="text" placeholder="600001">
            </div>
        </div>

        <h2>💳 Payment Details</h2>

        <div class="input-group">
            <label>Card Holder Name</label>
            <input type="text" placeholder="John Doe">
        </div>

        <div class="input-group">
            <label>Card Number</label>
            <input type="text" placeholder="1234 5678 9012 3456">
        </div>

        <div class="row">
            <div class="input-group">
                <label>Expiry Date</label>
                <input type="month">
            </div>

            <div class="input-group">
                <label>CVV</label>
                <input type="password" placeholder="123">
            </div>
        </div>

        <button class="place-order" onclick="placeOrder()">
            Place Order
        </button>

        <div class="secure">
            🔒 Secure SSL Encrypted Checkout
        </div>
    </div>

    <!-- Order Summary -->
    <div class="order-summary">
        <h2>🛒 Order Summary</h2>

        <div class="product">
            <span>iPhone 16 Pro</span>
            <span>₹89,999</span>
        </div>

        <div class="product">
            <span>Wireless Earbuds</span>
            <span>₹4,999</span>
        </div>

        <div class="product">
            <span>Shipping</span>
            <span>₹99</span>
        </div>

        <div class="total">
            Total: ₹95,097
        </div>

        <div class="coupon">
            <input type="text" placeholder="Coupon Code">
            <button>Apply</button>
        </div>

        <hr style="margin:20px 0">

        <p>✔ Free Returns</p>
        <p>✔ Secure Payment</p>
        <p>✔ Fast Delivery</p>
    </div>

</div>

<script>
function placeOrder(){
    alert("🎉 Order Placed Successfully!");
}
</script>

</body>
</html>
