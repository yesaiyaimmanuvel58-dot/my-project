<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    background:white;
    width:400px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    text-align:center;
}

.container h2{
    color:#333;
    margin-bottom:15px;
}

.container p{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    margin-bottom:15px;
    font-size:16px;
}

input:focus{
    border-color:#667eea;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#667eea;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#5563d6;
}

.back-login{
    margin-top:15px;
}

.back-login a{
    text-decoration:none;
    color:#667eea;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>Forgot Password?</h2>

    <p>
        Enter your registered email address.
        We will send a password reset link.
    </p>

    <form>
        <input type="email"
               placeholder="Enter your Email"
               required>

        <button type="submit">
            Send Reset Link
        </button>
    </form>

    <div class="back-login">
        <a href="#">Back to Login</a>
    </div>
</div>

</body>
</html>
