<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    display:flex;
}

/* Left Side */
.contact-info{
    flex:1;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    padding:40px;
}

.contact-info h2{
    margin-bottom:20px;
}

.contact-info p{
    margin-bottom:15px;
    line-height:1.6;
}

/* Right Side */
.contact-form{
    flex:1;
    padding:40px;
}

.contact-form h2{
    color:#333;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-group input,
.input-group textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

.input-group input:focus,
.input-group textarea:focus{
    outline:none;
    border-color:#2563eb;
}

.btn{
    width:100%;
    padding:14px;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

/* Responsive */
@media(max-width:768px){
    .container{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- Contact Information -->
    <div class="contact-info">
        <h2>Contact Information</h2>

        <p>📍 coimbatore, Tamil Nadu, India</p>
        <p>📞 +91 7397102746</p>
        <p>✉ info@example.com</p>

        <p>
            Feel free to contact us for any queries,
            suggestions, or support. We will get back
            to you as soon as possible.
        </p>
    </div>

    <!-- Contact Form -->
    <div class="contact-form">

        <h2>Contact Us</h2>

        <form>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text"
                       placeholder="Enter Your Name"
                       required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email"
                       placeholder="Enter Your Email"
                       required>
            </div>

            <div class="input-group">
                <label>Subject</label>
                <input type="text"
                       placeholder="Enter Subject"
                       required>
            </div>

            <div class="input-group">
                <label>Message</label>
                <textarea rows="5"
                          placeholder="Enter Your Message"
                          required></textarea>
            </div>

            <button type="submit" class="btn">
                Send Message
            </button>

        </form>

    </div>

</div>

</body>
</html>
