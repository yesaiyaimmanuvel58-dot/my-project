<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode Feature</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
    transition:0.4s;
}

body{
    background:#f4f4f4;
    color:#222;
}

.dark-mode{
    background:#121212;
    color:white;
}

/* Header */
.header{
    background:linear-gradient(90deg,#2563eb,#06b6d4);
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.dark-mode .header{
    background:linear-gradient(90deg,#111827,#374151);
}

/* Toggle Button */
.toggle-btn{
    background:white;
    color:#2563eb;
    border:none;
    padding:10px 20px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
}

.dark-mode .toggle-btn{
    background:#facc15;
    color:black;
}

/* Content Card */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.card{
    background:white;
    width:400px;
    padding:30px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.dark-mode .card{
    background:#1f2937;
    color:white;
}

.card h2{
    margin-bottom:15px;
}

.card p{
    margin-bottom:20px;
    line-height:1.6;
}

.btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="header">
    <h2>🌙 Dark Mode Demo</h2>

    <button class="toggle-btn" onclick="toggleMode()">
        Dark Mode
    </button>
</div>

<div class="container">
    <div class="card">
        <h2>Welcome</h2>
        <p>
            Click the Dark Mode button to switch between
            Light and Dark themes with a modern design.
        </p>

        <button class="btn">Explore More</button>
    </div>
</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");

    let btn = document.querySelector(".toggle-btn");

    if(document.body.classList.contains("dark-mode")){
        btn.innerHTML = "☀️ Light Mode";
    }
    else{
        btn.innerHTML = "🌙 Dark Mode";
    }
}
</script>

</body>
</html>
