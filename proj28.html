<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Product Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f7fc;
    padding:30px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    color:#4f46e5;
}

.search-section{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:30px;
}

input,select{
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

.search-box{
    flex:1;
    min-width:250px;
}

.result-info{
    margin-bottom:20px;
    color:#555;
    font-weight:600;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.product{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}

.product:hover{
    transform:translateY(-5px);
}

.price{
    color:#4f46e5;
    font-size:20px;
    font-weight:bold;
    margin:10px 0;
}

.category{
    color:#777;
    margin-bottom:10px;
}

.no-results{
    display:none;
    text-align:center;
    font-size:20px;
    color:red;
    margin-top:20px;
}
</style>
</head>
<body>

<div class="header">
    <h1>🛒 Smart Product Search</h1>
</div>

<div class="search-section">

    <input type="text"
           id="searchInput"
           class="search-box"
           placeholder="Search products...">

    <select id="categoryFilter">
        <option value="all">All Categories</option>
        <option value="electronics">Electronics</option>
        <option value="fashion">Fashion</option>
        <option value="accessories">Accessories</option>
    </select>

    <select id="sortPrice">
        <option value="default">Sort Price</option>
        <option value="low">Low to High</option>
        <option value="high">High to Low</option>
    </select>

</div>

<div class="result-info">
    Products Found: <span id="count">6</span>
</div>

<div class="products" id="productList">

    <div class="product" data-category="electronics" data-price="89999">
        <h3>iPhone 16 Pro</h3>
        <p class="category">Electronics</p>
        <p class="price">₹89,999</p>
    </div>

    <div class="product" data-category="electronics" data-price="64999">
        <h3>Samsung Galaxy S25</h3>
        <p class="category">Electronics</p>
        <p class="price">₹64,999</p>
    </div>

    <div class="product" data-category="fashion" data-price="2999">
        <h3>Sports Shoes</h3>
        <p class="category">Fashion</p>
        <p class="price">₹2,999</p>
    </div>

    <div class="product" data-category="fashion" data-price="1999">
        <h3>Denim Jacket</h3>
        <p class="category">Fashion</p>
        <p class="price">₹1,999</p>
    </div>

    <div class="product" data-category="accessories" data-price="4999">
        <h3>Wireless Headphones</h3>
        <p class="category">Accessories</p>
        <p class="price">₹4,999</p>
    </div>

    <div class="product" data-category="accessories" data-price="1499">
        <h3>Smart Watch</h3>
        <p class="category">Accessories</p>
        <p class="price">₹1,499</p>
    </div>

</div>

<div class="no-results" id="noResults">
    ❌ No Products Found
</div>

<script>
const searchInput =
document.getElementById("searchInput");

const categoryFilter =
document.getElementById("categoryFilter");

const sortPrice =
document.getElementById("sortPrice");

const productList =
document.getElementById("productList");

const count =
document.getElementById("count");

function filterProducts(){

    let searchText =
    searchInput.value.toLowerCase();

    let category =
    categoryFilter.value;

    let products =
    Array.from(document.querySelectorAll(".product"));

    let visibleCount = 0;

    products.forEach(product => {

        let name =
        product.querySelector("h3")
        .textContent.toLowerCase();

        let productCategory =
        product.dataset.category;

        let matchSearch =
        name.includes(searchText);

        let matchCategory =
        category === "all" ||
        category === productCategory;

        if(matchSearch && matchCategory){
            product.style.display="block";
            visibleCount++;
        }
        else{
            product.style.display="none";
        }
    });

    count.innerText = visibleCount;

    document.getElementById("noResults")
    .style.display =
    visibleCount===0 ? "block" : "none";

    sortProducts();
}

function sortProducts(){

    let products =
    Array.from(document.querySelectorAll(".product"));

    let sortValue =
    sortPrice.value;

    products.sort((a,b)=>{

        let priceA =
        parseInt(a.dataset.price);

        let priceB =
        parseInt(b.dataset.price);

        if(sortValue==="low"){
            return priceA-priceB;
        }

        if(sortValue==="high"){
            return priceB-priceA;
        }

        return 0;
    });

    products.forEach(product=>{
        productList.appendChild(product);
    });
}

searchInput.addEventListener(
"keyup",
filterProducts
);

categoryFilter.addEventListener(
"change",
filterProducts
);

sortPrice.addEventListener(
"change",
sortProducts
);
</script>

</body>
</html>
