<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    background:white;
    width:400px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    text-align:center;
}

.container h2{
    color:#333;
    margin-bottom:10px;
}

.container p{
    color:#666;
    margin-bottom:20px;
}

.otp-box{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.otp-box input{
    width:55px;
    height:55px;
    text-align:center;
    font-size:22px;
    border:2px solid #ccc;
    border-radius:8px;
}

.otp-box input:focus{
    border-color:#4facfe;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4facfe;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#2196f3;
}

.resend{
    margin-top:15px;
}

.resend a{
    text-decoration:none;
    color:#2196f3;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
    <h2>OTP Verification</h2>

    <p>Enter the 4-digit OTP sent to your mobile/email.</p>

    <form>
        <div class="otp-box">
            <input type="text" maxlength="1" required>
            <input type="text" maxlength="1" required>
            <input type="text" maxlength="1" required>
            <input type="text" maxlength="1" required>
        </div>

        <button type="submit">Verify OTP</button>
    </form>

    <div class="resend">
        <p>Didn't receive OTP? <a href="#">Resend OTP</a></p>
    </div>
</div>

</body>
</html>
