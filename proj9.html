<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

/* Header */
.header{
    background:#1e293b;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    font-size:24px;
}

/* Main Container */
.container{
    display:flex;
    min-height:100vh;
}

/* Sidebar */
.sidebar{
    width:220px;
    background:#0f172a;
    color:white;
    padding-top:20px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:15px 20px;
    border-bottom:1px solid #334155;
}

.sidebar ul li:hover{
    background:#334155;
    cursor:pointer;
}

/* Content Area */
.content{
    flex:1;
    padding:20px;
}

/* Cards */
.cards{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    background:white;
    flex:1;
    min-width:200px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
}

.card h3{
    color:#333;
}

.card p{
    font-size:28px;
    color:#2563eb;
    margin-top:10px;
}

/* Responsive */
@media(max-width:768px){
    .container{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .cards{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="header">
    <h2>My Dashboard</h2>
    <h4>Welcome, User</h4>
</div>

<div class="container">

    <div class="sidebar">
        <ul>
            <li>Dashboard</li>
            <li>Profile</li>
            <li>Users</li>
            <li>Reports</li>
            <li>Settings</li>
            <li>Logout</li>
        </ul>
    </div>

    <div class="content">

        <div class="cards">

            <div class="card">
                <h3>Total Users</h3>
                <p>1,250</p>
            </div>

            <div class="card">
                <h3>Orders</h3>
                <p>850</p>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <p>$12K</p>
            </div>

            <div class="card">
                <h3>Products</h3>
                <p>320</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
