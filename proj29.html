<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filter and Sorting</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

/* Controls */
.controls{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Product Grid */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.card h3{
    margin-bottom:10px;
}

.price{
    color:#2563eb;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Product Filter & Sorting</h1>

<div class="controls">

    <select id="filter" onchange="displayProducts()">
        <option value="all">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Accessories">Accessories</option>
    </select>

    <select id="sort" onchange="displayProducts()">
        <option value="default">Sort By</option>
        <option value="low">Price: Low to High</option>
        <option value="high">Price: High to Low</option>
    </select>

</div>

<div class="products" id="products"></div>

<script>

const products = [
    {name:"Laptop", category:"Electronics", price:50000},
    {name:"Mobile", category:"Electronics", price:20000},
    {name:"Headphones", category:"Accessories", price:3000},
    {name:"Smart Watch", category:"Accessories", price:5000}
];

function displayProducts(){

    let filter =
    document.getElementById("filter").value;

    let sort =
    document.getElementById("sort").value;

    let filteredProducts =
    [...products];

    // Filter
    if(filter !== "all"){
        filteredProducts =
        filteredProducts.filter(
        p => p.category === filter
        );
    }

    // Sort
    if(sort === "low"){
        filteredProducts.sort(
        (a,b) => a.price - b.price
        );
    }

    if(sort === "high"){
        filteredProducts.sort(
        (a,b) => b.price - a.price
        );
    }

    let output = "";

    filteredProducts.forEach(product => {
        output += `
        <div class="card">
            <h3>${product.name}</h3>
            <p>${product.category}</p>
            <div class="price">
                ₹${product.price}
            </div>
        </div>
        `;
    });

    document.getElementById("products")
    .innerHTML = output;
}

displayProducts();

</script>

</body>
</html>
