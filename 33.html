<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentication System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.container{
    width:400px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.title{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.tabs{
    display:flex;
    margin-bottom:20px;
}

.tabs button{
    flex:1;
    padding:12px;
    border:none;
    cursor:pointer;
    font-size:16px;
    background:#e5e7eb;
}

.tabs button.active{
    background:#2563eb;
    color:white;
}

.form{
    display:none;
}

.form.active{
    display:block;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

.options{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    font-size:14px;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    color:white;
    font-size:18px;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

.message{
    text-align:center;
    margin-top:15px;
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <h2 class="title">Authentication System</h2>

    <div class="tabs">
        <button class="active" onclick="showLogin()">Login</button>
        <button onclick="showSignup()">Signup</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="form active">
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox" onclick="togglePassword('loginPassword')">
                Show Password
            </label>

            <label>
                <input type="checkbox">
                Remember Me
            </label>
        </div>

        <button type="submit" class="btn">
            Login
        </button>
    </form>

    <!-- Signup Form -->
    <form id="signupForm" class="form">

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox" onclick="togglePassword('password')">
                Show Password
            </label>
        </div>

        <button type="submit" class="btn">
            Create Account
        </button>
    </form>

    <div class="message" id="message"></div>

</div>

<script>

function showLogin(){
    document.getElementById("loginForm").classList.add("active");
    document.getElementById("signupForm").classList.remove("active");

    document.querySelectorAll(".tabs button")[0]
    .classList.add("active");

    document.querySelectorAll(".tabs button")[1]
    .classList.remove("active");
}

function showSignup(){
    document.getElementById("signupForm").classList.add("active");
    document.getElementById("loginForm").classList.remove("active");

    document.querySelectorAll(".tabs button")[1]
    .classList.add("active");

    document.querySelectorAll(".tabs button")[0]
    .classList.remove("active");
}

function togglePassword(id){
    let field = document.getElementById(id);

    if(field.type === "password"){
        field.type = "text";
    }else{
        field.type = "password";
    }
}

/* Signup */
document.getElementById("signupForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    localStorage.setItem(
        "userEmail",
        document.getElementById("email").value
    );

    localStorage.setItem(
        "userPassword",
        document.getElementById("password").value
    );

    document.getElementById("message")
    .innerHTML = "Account Created Successfully!";
});

/* Login */
document.getElementById("loginForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let email =
    document.getElementById("loginEmail").value;

    let password =
    document.getElementById("loginPassword").value;

    let savedEmail =
    localStorage.getItem("userEmail");

    let savedPassword =
    localStorage.getItem("userPassword");

    if(email === savedEmail &&
       password === savedPassword){

        document.getElementById("message")
        .innerHTML = "Login Successful!";
    }
    else{
        document.getElementById("message")
        .innerHTML = "Invalid Email or Password!";
    }
});
</script>

</body>
</html>
